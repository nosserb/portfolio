<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
	<style>
		:root {
			--wall-size: 200px;
			--step-duration: 2000ms;
			--stamp-duration: 40000ms;
		}

		body {
			margin: 0;
			background: #000;
			height: 100vh;
			overflow: hidden;
			display: flex;
			font-family: "Anton", sans-serif;
			justify-content: center;
			align-items: center;
			perspective: 1000px;
		}

		div {
			transform-style: preserve-3d;
		}

		.rail {
			position: absolute;
			width: 100%;
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			transform: rotateX(-30deg) rotateY(-30deg);
		}

		.stamp {
			position: absolute;
			width: var(--wall-size);
			height: var(--wall-size);
			display: flex;
			justify-content: center;
			align-items: center;
			background: rgba(20, 20, 20, 1);
			color: #fff;
			font-size: 7rem;
			animation: stampSlide var(--stamp-duration) linear infinite;
			animation-delay: calc((var(--i) * -1 * var(--step-duration)) - 300ms);
		}

		@keyframes stampSlide {
			0% {
				transform: rotateX(90deg) rotateZ(-90deg) translateZ(calc(var(--wall-size) * -1)) translateY(130px);
			}
			100% {
				transform: rotateX(90deg) rotateZ(-90deg) translateZ(calc(var(--wall-size) * -1)) translateY(calc(130px - (var(--wall-size) * 20)));
			}
		}

		.world {
			transform: rotateX(-30deg) rotateY(-30deg);
		}

		.forward {
			position: absolute;
			animation: slide var(--step-duration) linear infinite;
		}

		.box {
			width: var(--wall-size);
			height: var(--wall-size);
			transform-origin: 100% 100%;
			animation: roll var(--step-duration) cubic-bezier(1.000, 0.010, 1.000, 1.000) infinite;
		}

		.wall {
			position: absolute;
			width: var(--wall-size);
			height: var(--wall-size);
			background: rgba(10, 10, 10, 0.8);
			border: 1px solid rgba(250, 250, 250, 1);
			box-sizing: border-box;
		}

		.wall::before {
			content: "";
			position: absolute;
			width: 100%;
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			color: #fff;
			font-size: 7rem;
		}

		.wall:nth-child(1) {
			transform: translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(2) {
			transform: rotateX(180deg) translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(3) {
			transform: rotateX(90deg) translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(3)::before {
			transform: rotateX(180deg) rotateZ(90deg) translateZ(-1px);
			animation: zeroFour 4000ms -2000ms linear infinite;
		}

		.wall:nth-child(4) {
			transform: rotateX(-90deg) translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(4)::before {
			transform: rotateX(180deg) rotateZ(-90deg) translateZ(-1px);
			animation: zeroFour 4000ms -2000ms linear infinite;
		}

		.wall:nth-child(5) {
			transform: rotateY(90deg) translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(5)::before {
			transform: rotateX(180deg) translateZ(-1px);
			animation: zeroFour 4000ms linear infinite;
		}

		.wall:nth-child(6) {
			transform: rotateY(-90deg) translateZ(calc(var(--wall-size) / 2));
		}

		.wall:nth-child(6)::before {
			transform: rotateX(180deg) rotateZ(180deg) translateZ(-1px);
			animation: zeroFour 4000ms linear infinite;
		}

		@keyframes zeroFour {
			0% {
				content: "4";
			}
			100% {
				content: "0";
			}
		}

		@keyframes roll {
			0% {
				transform: rotateZ(0deg);
			}
			85% {
				transform: rotateZ(90deg);
			}
			87% {
				transform: rotateZ(88deg);
			}
			90% {
				transform: rotateZ(90deg);
			}
			100% {
				transform: rotateZ(90deg);
			}
		}

		@keyframes slide {
			0% {
				transform: translateX(0);
			}
			100% {
				transform: translateX(calc(var(--wall-size) * -1));
			}
		}
	</style>
</head>
<body>
	<div class="rail" id="rail"></div>

	<div class="world">
		<div class="forward">
			<div class="box" id="box"></div>
		</div>
	</div>

	<script>
		const rail = document.getElementById("rail");
		const box = document.getElementById("box");

		for (let i = 0; i < 10; i += 1) {
			const four = document.createElement("div");
			four.className = "stamp four";
			four.style.setProperty("--i", String(i * 2 + 1));
			four.textContent = "4";

			const zero = document.createElement("div");
			zero.className = "stamp zero";
			zero.style.setProperty("--i", String(i * 2 + 2));
			zero.textContent = "0";

			rail.appendChild(four);
			rail.appendChild(zero);
		}

		for (let i = 0; i < 6; i += 1) {
			const wall = document.createElement("div");
			wall.className = "wall";
			box.appendChild(wall);
		}
	</script>
</body>
</html>
